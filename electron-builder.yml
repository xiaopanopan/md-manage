appId: com.mdmanage.app
productName: md-manage
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: build/icon.png
  darkModeSupport: true

win:
  target:
    - nsis
  icon: build/icon.png

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
