appId: com.digitalzen.app
productName: Digital Zen
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: build/icon.icns
  darkModeSupport: true

win:
  target:
    - nsis
  icon: build/icon.ico

linux:
  target:
    - AppImage
    - deb
  icon: build/icons

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
